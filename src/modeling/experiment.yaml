# NOTE: Data splitting logic is enabled; the runner will auto-build splits from GRIT.
name: "rf_smote_baseline"

imputation:
  mode: none
  fill_constant: 0.0

data:
  # Cross-validation and automatic splitting
  use_cross_validation: true
  n_folds: 5
  test_size: 0.2
  val_size: 0.2
  min_samples_per_class: 5
  random_state: 42

  # Memory management
  pixels_per_image: 10000          # sample pixels per image to balance RAM + recall

  # Label CSV
  csv_path: "data/labels/labeled_surveys/random_sample/latest_irrigation_table.csv"

  # Output root
  data_dir: "data/modeling"

  # GRIT cloud paths
  grit_images_dir: "/home/waves/data/smallholder-irrigation-dataset/data/features_v2"
  grit_masks_dir:  "/home/waves/data/smallholder-irrigation-dataset/data/dataset/labels"

  # Label/Image bands used downstream
  label_bands: [2]                 # Band 2 for binary irrigation mask
  image_bands: ["B2", "B3", "B4", "B5", "B6", "B7", "B8", "B8A", "B11", "B12", "NDVI", "EVI", "NDWI", "SCL"]

model:
  type: "random_forest"            # Supervised baseline with SMOTE + class_weight
  save_feature_importance: true    # Enable feature importance export for tree-based models

  # Supervised Random Forest hyperparameters
  hyperparameters:
    random_forest:
      n_estimators: 300            # Number of trees
      max_depth: 25                # Cap tree depth for generalization
      class_weight: "balanced"     # Match the Python script exactly
      n_jobs: -1
      random_state: 42

  # SMOTE balancing configuration
  imbalance_strategy: "smote"      # Use SMOTE to oversample irrigation class (~0.1 ratio)
  smote:
    sampling_strategy: 0.2
    k_neighbors: 7
    random_state: 42

  # Downsampling + SMOTE controller
  sampling:
    use_smote: true     # if true, apply SMOTE after downsampling
    target_ratio: 3.0   # downsample majority to ~3:1 (majority:minority) before SMOTE

visualization:
  num_samples: 2

evaluation:
  compute_detailed_metrics: true   # Enable detailed metric computation

output:
  base_dir: "/home/waves/data/smallholder-irrigation-dataset/data/modeling/experiments"