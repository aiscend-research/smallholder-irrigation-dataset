name: "rf_baseline"

data:
  data_dir: "../../data/modeling"
  train_files: ["site_-15.04_26.69_2023_1"]
  val_files: ["site_-15.04_26.69_2023_1"]
  label_bands: [1,2]
  image_bands: ["EVI"] # e.g. ["B2", "B3"]

model:
  type: "random_forest" # options: "gradient_boosting", "random_forest"
  # Only the hyperparameters corresponding to the above model type will be used in the experiement designation
  hyperparameters: # ignored if not a random_forest model
    random_forest: 
      n_estimators: 100
      random_state: 42
    
    gradient_boosting: # ignored if not a gradient_boosting model
      n_estimators: 200
      learning_rate: 0.05
      max_depth: 4
      subsample: 0.8
      min_samples_split: 5
      min_samples_leaf: 3
      random_state: 42

visualization:
  num_samples: 2

output:
  base_dir: "./experiments"