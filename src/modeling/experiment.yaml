# NOTE: Data splitting logic is enabled; the runner will auto-build splits from GRIT.
name: "isolation_forest_anomaly_tuned"

imputation:
  mode: none
  fill_constant: 0.0

data:
  # Cross-validation and automatic splitting
  use_cross_validation: true
  n_folds: 5
  test_size: 0.2
  val_size: 0.2
  min_samples_per_class: 5
  random_state: 42

  # Memory management
  pixels_per_image: 10000          # sample pixels per image to balance RAM + recall

  # Label CSV
  csv_path: "data/labels/labeled_surveys/random_sample/latest_irrigation_table.csv"

  # Output root
  data_dir: "data/modeling"

  # GRIT cloud paths
  grit_images_dir: "/home/waves/data/smallholder-irrigation-dataset/data/features_v2"
  grit_masks_dir:  "/home/waves/data/smallholder-irrigation-dataset/data/dataset/labels"

  # Label/Image bands used downstream
  label_bands: [2]                # Band 2 for basic training (code auto-loads all 8 when detailed_metrics=true)
  image_bands: ["B2", "B3", "B4", "B5", "B6", "B7", "B8", "B8A", "B11", "B12", "NDVI", "EVI", "NDWI", "SCL"]

model:
  type: "isolation_forest"        # Anomaly detection approach
  save_feature_importance: false  # Not applicable for anomaly detectors
  
  # Anomaly detection configuration
  anomaly_detection:
    method: "isolation_forest"    # Options: "isolation_forest", "ensemble", "one_class_svm", "lof"
    n_estimators: 300              # More trees for better detection
    # contamination is auto-calculated from training data (irrigation proportion)

visualization:
  num_samples: 2

evaluation:
  compute_detailed_metrics: true

output:
  base_dir: "/home/waves/data/smallholder-irrigation-dataset/data/modeling/experiments"