# NOTE: Data splitting logic is enabled; the runner will auto-build splits from GRIT.
name: "rf_baseline"

imputation:
  mode: none        # options: none, drop, temporal
  fill_constant: 0.0

data:
  # --- Cross-validation and automatic splitting ---
  use_cross_validation: true     # true: run K-fold CV; false: single train/val
  n_folds: 5
  test_size: 0.2
  val_size: 0.2
  min_samples_per_class: 5
  random_state: 42

  # --- Memory management (with 128GB RAM, load everything directly) ---
  pixels_per_image: null        # null = use ALL pixels (loads into RAM)

  # --- Label CSV (if provided, used for stratification; otherwise fallback to label Band-2) ---
  csv_path: "data/labels/labeled_surveys/random_sample/latest_irrigation_table.csv"

  # --- Output root (used to write splits and experiments) ---
  data_dir: "data/modeling"

  # --- GRIT cloud paths ---
  grit_images_dir: "/home/waves/data/smallholder-irrigation-dataset/data/features"
  grit_masks_dir:  "/home/waves/data/smallholder-irrigation-dataset/data/masks/labels"

  # --- Label/Image bands used downstream ---
  label_bands: [2]
  image_bands: ["EVI"]

model:
  type: "random_forest" 
  save_feature_importance: true
  hyperparameters: 
    random_forest: 
      n_estimators: 100
      random_state: 42
    gradient_boosting: 
      n_estimators: 200
      learning_rate: 0.05
      max_depth: 4
      subsample: 0.8
      min_samples_split: 5
      min_samples_leaf: 3
      random_state: 42

visualization:
  num_samples: 2

evaluation:
  compute_detailed_metrics: true

output:
  base_dir: "/home/waves/data/smallholder-irrigation-dataset/data/modeling/experiments"